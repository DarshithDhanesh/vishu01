<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Vishu</title>
  <link href="./Happy Vishu(01)_files/css2" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif Malayalam', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page { display: none; min-height: 100vh; width: 100%; }
    .page.active { display: flex; flex-direction: column; align-items: center; }

    .main-page {
      background: linear-gradient(160deg, #fffbe6 0%, #fff7d6 40%, #fef3c7 100%);
      padding: 2.5rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .main-page::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(251,191,36,0.18);
    }

    .main-page::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(134,239,172,0.18);
    }

    .kani-strip {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      font-size: 22px;
      z-index: 1;
    }

    .vishu-title {
      font-family: 'Noto Serif Malayalam', Georgia, serif;
      font-size: 42px;
      font-weight: 700;
      color: #92400e;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.3rem;
      z-index: 1;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 0 rgba(251,191,36,0.4);
    }

    .vishu-subtitle {
      font-size: 15px;
      color: #b45309;
      text-align: center;
      margin-bottom: 1.8rem;
      z-index: 1;
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .photo-frame {
      position: relative;
      z-index: 1;
      margin-bottom: 2rem;
    }

    .photo-ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, #f59e0b, #fde68a, #f59e0b, #d97706);
      box-shadow: 0 0 0 4px #fef3c7, 0 8px 32px rgba(180,83,9,0.18);
    }

    .photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #fde68a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .photo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #b45309;
      cursor: pointer;
      padding: 1rem;
      text-align: center;
    }

    .photo-placeholder svg { opacity: 0.6; }

    .photo-placeholder span {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.8;
    }

    .upload-input { display: none; }

    .flowers-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1.8rem;
      z-index: 1;
    }

    .flower { font-size: 20px; }

    .greeting-text {
      font-size: 15px;
      color: #78350f;
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      margin-bottom: 2rem;
      z-index: 1;
      font-style: italic;
    }

    .kaineetam-btn {
      z-index: 1;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 44px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 18px rgba(217,119,6,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .kaineetam-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(217,119,6,0.45);
    }

    .kaineetam-btn:active { transform: scale(0.97); }

    .kaineetam-btn::before {
      content: '🪙';
      margin-right: 8px;
      font-size: 18px;
    }

    .sorry-page {
      background: linear-gradient(160deg, #fef2f2 0%, #fff1f2 50%, #fce7f3 100%);
      padding: 3rem 1.5rem;
      position: relative;
      overflow: hidden;
      justify-content: center;
      min-height: 100vh;
    }

    .sorry-page::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(251,113,133,0.12);
    }

    .sorry-icon {
      font-size: 64px;
      margin-bottom: 1rem;
      z-index: 1;
      animation: wobble 1.2s ease-in-out;
    }

    @keyframes wobble {
      0%   { transform: rotate(0deg) scale(0.5); opacity: 0; }
      40%  { transform: rotate(-8deg) scale(1.15); }
      60%  { transform: rotate(6deg) scale(0.95); }
      80%  { transform: rotate(-3deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); opacity: 1; }
    }

    .sorry-title {
      font-size: 26px;
      font-weight: 700;
      color: #9f1239;
      text-align: center;
      z-index: 1;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .sorry-sub {
      font-size: 15px;
      color: #be123c;
      text-align: center;
      z-index: 1;
      margin-bottom: 2rem;
      opacity: 0.75;
    }

    .back-btn {
      z-index: 1;
      background: transparent;
      color: #9f1239;
      border: 1.5px solid #f43f5e;
      border-radius: 50px;
      padding: 11px 30px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .back-btn:hover { background: #9f1239; color: #fff; }

    .confetti-row {
      font-size: 20px;
      display: flex;
      gap: 8px;
      z-index: 1;
      margin-bottom: 1.5rem;
    }

    .vishu-year {
      font-size: 13px;
      color: #b45309;
      z-index: 1;
      margin-top: 1.5rem;
      opacity: 0.6;
      letter-spacing: 1px;
    }
  </style>
</head>

    function goToSorry() {
      document.getElementById('mainPage').classList.remove('active');
      document.getElementById('sorryPage').classList.add('active');

    function goBack() {
      document.getElementById('sorryPage').classList.remove('active');
      document.getElementById('mainPage').classList.add('active');
    }

    function loadPhoto(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.getElementById('userPhoto');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('photoPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
